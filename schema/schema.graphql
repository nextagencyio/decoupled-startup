type Query {
  node(id: ID!, revision: ID): NodeUnion
  paragraph(id: ID!, revision: ID): ParagraphUnion
  term(id: ID!, revision: ID): TermUnion
  menu(name: MenuAvailable!): Menu
  info: SchemaInformation!
  nodeLandingPages(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodeLandingPageConnection!
  paragraphAccordions(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphAccordionConnection!
  paragraphCards(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphCardConnection!
  paragraphCardGroups(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphCardGroupConnection!
  paragraphFaqItems(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphFaqItemConnection!
  paragraphFeatureItems(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphFeatureItemConnection!
  paragraphHeroes(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphHeroConnection!
  paragraphLogos(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphLogoConnection!
  paragraphLogoCollections(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphLogoCollectionConnection!
  paragraphNewsletters(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphNewsletterConnection!
  paragraphPricings(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphPricingConnection!
  paragraphPricingTiers(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphPricingTierConnection!
  paragraphQuotes(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphQuoteConnection!
  paragraphSidebysides(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphSidebysideConnection!
  paragraphStatItems(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphStatItemConnection!
  paragraphStats(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphStatConnection!
  paragraphTestimonials(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphTestimonialConnection!
  paragraphTextBlocks(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphTextBlockConnection!
  termTags(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): TermTagConnection!
  preview(id: ID!, token: String, langcode: String): NodeUnion
  route(path: String!, revision: ID): RouteUnion
}

